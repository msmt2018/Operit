name: Sync GitHub To Gitee

on:
  delete:
  release:
    types:
      - published
      - edited
      - prereleased
      - released
      - deleted
      - unpublished
  workflow_dispatch:
  schedule:
    - cron: "27 3 * * *"

concurrency:
  group: sync-gitee-${{ github.repository }}
  cancel-in-progress: false

env:
  GITEE_OWNER: ${{ vars.GITEE_OWNER }}
  GITEE_REPO: ${{ vars.GITEE_REPO }}
  GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}

jobs:
  trigger-gitee-mirror-pull:
    runs-on: ubuntu-latest
    steps:
      - name: Validate required settings
        run: |
          set -euo pipefail
          test -n "${GITEE_OWNER}"
          test -n "${GITEE_REPO}"
          test -n "${GITEE_TOKEN}"

      - name: Trigger Gitee remote mirror pull
        run: |
          set -euo pipefail
          api="https://gitee.com/api/v5/repos/${GITEE_OWNER}/${GITEE_REPO}/remote_mirror/pull"
          response="$(curl -fsS -X POST "${api}?access_token=${GITEE_TOKEN}")"
          echo "Gitee response: ${response}"
